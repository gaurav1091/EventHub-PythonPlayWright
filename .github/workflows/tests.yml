name: EventHub Automation Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  quality:
    name: Quality checks
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run Ruff
        run: ruff check src tests conftest.py

      - name: Run mypy
        run: mypy src tests conftest.py

  api-tests:
    name: API tests
    runs-on: ubuntu-latest
    needs: quality
    env:
      EVENTHUB_BASE_URL: ${{ secrets.EVENTHUB_BASE_URL }}
      EVENTHUB_USER_EMAIL: ${{ secrets.EVENTHUB_USER_EMAIL }}
      EVENTHUB_USER_PASSWORD: ${{ secrets.EVENTHUB_USER_PASSWORD }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run API tests
        run: pytest tests/api -m api

      - name: Upload API test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-test-reports
          path: |
            reports/
            test-results/
          if-no-files-found: ignore

  ui-tests:
    name: UI tests (${{ matrix.browser }})
    runs-on: ubuntu-latest
    needs: quality
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox]
    env:
      EVENTHUB_BASE_URL: ${{ secrets.EVENTHUB_BASE_URL }}
      EVENTHUB_USER_EMAIL: ${{ secrets.EVENTHUB_USER_EMAIL }}
      EVENTHUB_USER_PASSWORD: ${{ secrets.EVENTHUB_USER_PASSWORD }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
          python -m playwright install --with-deps ${{ matrix.browser }}

      - name: Run UI and hybrid tests
        run: pytest tests/ui --browser-name ${{ matrix.browser }}

      - name: Upload UI test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-test-reports-${{ matrix.browser }}
          path: |
            reports/
            test-results/
          if-no-files-found: ignore
