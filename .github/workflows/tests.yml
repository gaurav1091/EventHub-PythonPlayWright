name: EventHub Automation Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      test_type:
        description: "Test suite to run"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - api
          - ui
          - smoke
          - e2e
          - regression
          - auth
          - events
          - booking
          - admin
      browser:
        description: "Browser for UI-capable test suites"
        required: true
        default: "chrome"
        type: choice
        options:
          - chrome
          - firefox
          - all

env:
  EVENTHUB_CLEAN_REPORTS: "false"

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  quality:
    name: Quality checks
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run Ruff
        run: ruff check src tests conftest.py

      - name: Run mypy
        run: mypy src tests conftest.py

  api-tests:
    name: API tests
    if: github.event_name != 'workflow_dispatch'
    runs-on: ubuntu-latest
    needs: quality
    env:
      EVENTHUB_BASE_URL: ${{ secrets.EVENTHUB_BASE_URL }}
      EVENTHUB_USER_EMAIL: ${{ secrets.EVENTHUB_USER_EMAIL }}
      EVENTHUB_USER_PASSWORD: ${{ secrets.EVENTHUB_USER_PASSWORD }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Prepare report directories
        run: |
          rm -rf reports test-results
          mkdir -p reports/allure-results test-results

      - name: Run API tests
        run: pytest tests/api -m "api and not quarantine"

      - name: Add Allure environment metadata
        if: always()
        run: |
          mkdir -p reports/allure-results
          {
            echo "Run Type=push_or_pull_request"
            echo "Selected Suite=api"
            echo "Selected Browser=not_applicable"
            echo "Workflow=${{ github.workflow }}"
            echo "Run ID=${{ github.run_id }}"
          } > reports/allure-results/environment.properties

      - name: Upload API test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-test-reports
          path: |
            reports/
            test-results/
            reports/allure-results/
          if-no-files-found: ignore

  ui-tests:
    name: UI tests (${{ matrix.browser }})
    if: github.event_name != 'workflow_dispatch'
    runs-on: ubuntu-latest
    needs: quality
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox]
    env:
      EVENTHUB_BASE_URL: ${{ secrets.EVENTHUB_BASE_URL }}
      EVENTHUB_USER_EMAIL: ${{ secrets.EVENTHUB_USER_EMAIL }}
      EVENTHUB_USER_PASSWORD: ${{ secrets.EVENTHUB_USER_PASSWORD }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
          python -m playwright install --with-deps ${{ matrix.browser }}

      - name: Prepare report directories
        run: |
          rm -rf reports test-results
          mkdir -p reports/allure-results test-results

      - name: Run UI and hybrid tests
        run: pytest tests/ui -m "not quarantine" --browser-name ${{ matrix.browser }}

      - name: Add Allure environment metadata
        if: always()
        run: |
          mkdir -p reports/allure-results
          {
            echo "Run Type=push_or_pull_request"
            echo "Selected Suite=ui"
            echo "Selected Browser=${{ matrix.browser }}"
            echo "Workflow=${{ github.workflow }}"
            echo "Run ID=${{ github.run_id }}"
          } > reports/allure-results/environment.properties

      - name: Upload UI test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-test-reports-${{ matrix.browser }}
          path: |
            reports/
            test-results/
            reports/allure-results/
          if-no-files-found: ignore

  manual-tests:
    name: Manual tests (${{ inputs.test_type }} / ${{ inputs.browser }})
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    needs: quality
    env:
      EVENTHUB_BASE_URL: ${{ secrets.EVENTHUB_BASE_URL }}
      EVENTHUB_USER_EMAIL: ${{ secrets.EVENTHUB_USER_EMAIL }}
      EVENTHUB_USER_PASSWORD: ${{ secrets.EVENTHUB_USER_PASSWORD }}
      TEST_TYPE: ${{ inputs.test_type }}
      SELECTED_BROWSER: ${{ inputs.browser }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Install Playwright browsers
        if: inputs.test_type != 'api'
        run: |
          if [ "$SELECTED_BROWSER" = "chrome" ]; then
            PLAYWRIGHT_BROWSER="chromium"
          else
            PLAYWRIGHT_BROWSER="$SELECTED_BROWSER"
          fi

          if [ "$SELECTED_BROWSER" = "all" ]; then
            python -m playwright install --with-deps chromium firefox
          else
            python -m playwright install --with-deps "$PLAYWRIGHT_BROWSER"
          fi

      - name: Prepare report directories
        run: |
          rm -rf reports test-results
          mkdir -p reports/allure-results test-results

      - name: Run selected tests
        run: |
          set -euo pipefail

          case "$TEST_TYPE" in
            all)
              pytest_args=(-m "not quarantine")
              ;;
            regression)
              pytest_args=(-m "not quarantine")
              ;;
            api)
              pytest_args=(tests/api -m "api and not quarantine")
              ;;
            ui)
              pytest_args=(tests/ui -m "not quarantine")
              ;;
            e2e)
              pytest_args=(tests/ui/e2e -m "e2e and not quarantine")
              ;;
            smoke|auth|events|booking|admin)
              pytest_args=(tests/ui -m "$TEST_TYPE and not quarantine")
              ;;
            *)
              echo "Unsupported test type: $TEST_TYPE"
              exit 1
              ;;
          esac

          if [ "$SELECTED_BROWSER" = "chrome" ]; then
            PLAYWRIGHT_BROWSER="chromium"
          else
            PLAYWRIGHT_BROWSER="$SELECTED_BROWSER"
          fi

          if [ "$TEST_TYPE" = "api" ]; then
            pytest "${pytest_args[@]}"
          elif [ "$SELECTED_BROWSER" = "all" ]; then
            pytest "${pytest_args[@]}" --browser-name chromium
            pytest "${pytest_args[@]}" --browser-name firefox
          else
            pytest "${pytest_args[@]}" --browser-name "$PLAYWRIGHT_BROWSER"
          fi

      - name: Add Allure environment metadata
        if: always()
        run: |
          mkdir -p reports/allure-results
          {
            echo "Run Type=manual"
            echo "Selected Suite=${{ inputs.test_type }}"
            echo "Selected Browser=${{ inputs.browser }}"
            echo "Workflow=${{ github.workflow }}"
            echo "Run ID=${{ github.run_id }}"
          } > reports/allure-results/environment.properties

      - name: Upload manual test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: manual-test-reports-${{ inputs.test_type }}-${{ inputs.browser }}
          path: |
            reports/
            test-results/
            reports/allure-results/
          if-no-files-found: ignore

  publish-allure-report:
    name: Publish Allure report
    if: always() && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    needs:
      - api-tests
      - ui-tests
      - manual-tests
    environment:
      name: github-pages
      url: ${{ steps.report-url.outputs.url }}
    steps:
      - name: Download manual test report artifact
        if: github.event_name == 'workflow_dispatch'
        uses: actions/download-artifact@v4
        with:
          path: downloaded-artifacts
          name: manual-test-reports-${{ inputs.test_type }}-${{ inputs.browser }}

      - name: Download push test report artifacts
        if: github.event_name != 'workflow_dispatch'
        uses: actions/download-artifact@v4
        with:
          path: downloaded-artifacts
          pattern: "*test-reports*"
          merge-multiple: false

      - name: Merge Allure result files
        id: allure-results
        run: |
          set -euo pipefail
          mkdir -p combined-allure-results

          while IFS= read -r -d '' results_dir; do
            find "$results_dir" -maxdepth 1 -type f -exec cp {} combined-allure-results/ \;
          done < <(find downloaded-artifacts -type d -name allure-results -print0)

          result_count="$(find combined-allure-results -type f | wc -l | tr -d ' ')"
          echo "result_count=$result_count" >> "$GITHUB_OUTPUT"

          if [ "$result_count" = "0" ]; then
            echo "No Allure result files found."
            exit 1
          fi

      - name: Set up Java for Allure
        if: steps.allure-results.outputs.result_count != '0'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install Allure commandline
        if: steps.allure-results.outputs.result_count != '0'
        run: npm install -g allure-commandline@2.34.1

      - name: Generate Allure HTML report
        if: steps.allure-results.outputs.result_count != '0'
        run: allure generate combined-allure-results --clean -o allure-report

      - name: Restore published report history
        if: steps.allure-results.outputs.result_count != '0'
        uses: actions/cache/restore@v4
        with:
          path: site
          key: allure-site-${{ github.run_id }}
          restore-keys: |
            allure-site-

      - name: Prepare GitHub Pages site
        if: steps.allure-results.outputs.result_count != '0'
        run: |
          set -euo pipefail
          report_path="runs/${{ github.run_id }}"

          mkdir -p "site/$report_path" site/latest
          cp -R allure-report/. "site/$report_path/"
          cp -R allure-report/. site/latest/

          cat > site/index.html <<EOF
          <!doctype html>
          <html lang="en">
            <head>
              <meta charset="utf-8">
              <meta http-equiv="refresh" content="0; url=$report_path/">
              <title>EventHub Allure Report</title>
            </head>
            <body>
              <p><a href="$report_path/">Open latest Allure report</a></p>
            </body>
          </html>
          EOF

      - name: Save published report history
        if: steps.allure-results.outputs.result_count != '0'
        uses: actions/cache/save@v4
        with:
          path: site
          key: allure-site-${{ github.run_id }}

      - name: Configure GitHub Pages
        if: steps.allure-results.outputs.result_count != '0'
        uses: actions/configure-pages@v5

      - name: Upload Allure report to GitHub Pages
        if: steps.allure-results.outputs.result_count != '0'
        uses: actions/upload-pages-artifact@v4
        with:
          path: site

      - name: Deploy Allure report to GitHub Pages
        if: steps.allure-results.outputs.result_count != '0'
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Set run-specific report URL
        if: steps.allure-results.outputs.result_count != '0'
        id: report-url
        run: echo "url=${{ steps.deployment.outputs.page_url }}runs/${{ github.run_id }}/" >> "$GITHUB_OUTPUT"

      - name: Add Allure report link to workflow summary
        if: steps.allure-results.outputs.result_count != '0'
        run: |
          echo "### Allure Report" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "[Open this run's Allure report](${{ steps.report-url.outputs.url }})" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Report path: \`runs/${{ github.run_id }}/\`" >> "$GITHUB_STEP_SUMMARY"
